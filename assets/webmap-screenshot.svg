<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Web Map Screenshot Placeholder</title>
  <desc id="desc">Replace this placeholder with a real screenshot of the web map.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3d5e" />
      <stop offset="100%" stop-color="#1f6f8b" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="80" y="80" width="1120" height="560" rx="12" fill="#ffffff" opacity="0.9" />
  <text x="640" y="320" text-anchor="middle" font-size="52" font-family="Segoe UI, Arial, sans-serif" fill="#1b1b1b">
    Add Your Web Map Screenshot
  </text>
  <text x="640" y="380" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#3a3a3a">
    Save it as assets/webmap-screenshot.png (or replace this SVG)
  </text>
</svg>
